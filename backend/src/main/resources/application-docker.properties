# Nombre de la aplicacion para logs/actuator en entorno Docker.
spring.application.name=proyecto-nicolas

# URL JDBC hacia el servicio "db" definido en docker-compose.
# Se permite override con variables de entorno para despliegues futuros.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://db:3306/barberia_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate actualiza esquema segun entidades (util para proyecto academico).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Puerto interno que expone el contenedor backend.
server.port=8080
