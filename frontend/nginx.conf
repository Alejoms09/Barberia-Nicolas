server {
    # Nginx escucha peticiones HTTP dentro del contenedor frontend.
    listen 80;
    server_name localhost;

    # Carpeta donde quedaron copiados index.html, css y js.
    root /usr/share/nginx/html;
    index index.html;

    # Sirve el frontend estatico.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para API:
    # redirige llamadas /api al contenedor backend sin exponer CORS al navegador.
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
